<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Left User (Green) -->
  <circle cx="180" cy="170" r="38" fill="#84cc16" />
  <path d="M 125 310 C 125 240, 235 240, 235 310 Z" fill="#84cc16" />

  <!-- Right User (Teal) -->
  <circle cx="332" cy="170" r="38" fill="#06b6d4" />
  <path d="M 277 310 C 277 240, 387 240, 387 310 Z" fill="#06b6d4" />

  <!-- Center User (Blue) -->
  <circle cx="256" cy="140" r="50" fill="#0284c7" />
  <path d="M 185 300 C 185 210, 327 210, 327 300 Z" fill="#0284c7" />

  <!-- Laptop/Screen Overlay -->
  <!-- Screen Base/Shadow -->
  <rect x="175" y="270" width="162" height="108" rx="12" fill="#0284c7" />
  <rect x="180" y="275" width="152" height="98" rx="8" fill="#ffffff" />
  
  <!-- Screen Header (3 dots) -->
  <circle cx="195" cy="285" r="3" fill="#0284c7" />
  <circle cx="205" cy="285" r="3" fill="#0284c7" />
  <circle cx="215" cy="285" r="3" fill="#0284c7" />
  
  <!-- User Profile Icon on Screen -->
  <circle cx="212" cy="315" r="10" fill="#0284c7" />
  <path d="M 197 340 C 197 325, 227 325, 227 340 Z" fill="#0284c7" />
  
  <!-- Content Lines on Screen -->
  <rect x="238" y="306" width="45" height="4" rx="2" fill="#0284c7" />
  <rect x="238" y="316" width="30" height="4" rx="2" fill="#0284c7" />
  
  <!-- Bar Chart on Screen -->
  <rect x="288" y="330" width="6" height="20" rx="1.5" fill="#84cc16" />
  <rect x="298" y="320" width="6" height="30" rx="1.5" fill="#0284c7" />
  <rect x="308" y="310" width="6" height="40" rx="1.5" fill="#06b6d4" />
  
  <!-- Sweeping Crescent Arc -->
  <path d="M 105 230 C 90 320, 150 420, 256 420 C 362 420, 422 320, 407 230 C 427 330, 360 440, 256 440 C 152 440, 85 330, 105 230 Z" fill="#0284c7" />
